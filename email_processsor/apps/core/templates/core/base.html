<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Flow Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { min-height: 100vh; background-color: #212529; }
    .sidebar .nav-link { color: #adb5bd; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: #343a40; border-radius: 6px; }
    .sidebar .brand { color: #fff; font-size: 1.2rem; font-weight: 600; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .badge-coa { background-color: #0d6efd; }
    .badge-escalation { background-color: #dc3545; }
    .badge-other { background-color: #6c757d; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-2 sidebar py-4 px-3">
      <div class="brand mb-4 px-2"><i class="bi bi-envelope-fill me-2"></i>Email Flow</div>
      <nav class="nav flex-column gap-1">
        <a href="/dashboard/" class="nav-link {% block nav_dashboard %}{% endblock %}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a href="/dashboard/emails/" class="nav-link {% block nav_emails %}{% endblock %}"><i class="bi bi-envelope me-2"></i>Emails</a>
        <a href="/dashboard/coa/" class="nav-link {% block nav_coa %}{% endblock %}"><i class="bi bi-file-earmark-text me-2"></i>COA Records</a>
        <a href="/dashboard/escalations/" class="nav-link {% block nav_escalations %}{% endblock %}"><i class="bi bi-exclamation-triangle me-2"></i>Escalations</a>
      </nav>
    </div>

    <!-- Main content -->
    <div class="col-md-10 py-4 px-4">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
